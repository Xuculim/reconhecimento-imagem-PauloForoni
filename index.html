<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card-main {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      color: #fff;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #e0d7ff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    #webcam-wrapper {
      display: flex;
      justify-content: center;
      margin: 1.5rem 0 1rem;
    }

    #webcam-container canvas {
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 30px rgba(130, 80, 255, 0.3);
      max-width: 100%;
    }

    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.45);
      width: 100%;
      justify-content: center;
    }

    .btn-start:hover {
      background: linear-gradient(135deg, #6d28d9, #4338ca);
      box-shadow: 0 6px 24px rgba(109, 40, 217, 0.6);
      transform: translateY(-1px);
      color: #fff;
    }

    .btn-start:active {
      transform: scale(0.97);
    }

    .btn-start i {
      font-size: 1.2rem;
    }

    .label-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.6rem;
    }

    .label-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .progress {
      height: 10px;
      border-radius: 8px;
      background-color: rgba(255,255,255,0.1);
    }

    .progress-bar {
      border-radius: 8px;
      transition: width 0.2s ease;
      background: linear-gradient(90deg, #7c3aed, #60a5fa);
    }

    #label-container {
      margin-top: 1.25rem;
    }

    #status-msg {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card-main shadow-lg">
    <div class="d-flex align-items-center gap-3 mb-3">
      <div>
        <div class="title"><i class="bi bi-camera-video-fill me-2" style="color:#a78bfa;"></i>Teachable Machine</div>
        <div class="subtitle">Reconhecimento de imagem em tempo real</div>
      </div>
    </div>

    <div id="webcam-wrapper">
      <div id="webcam-container"></div>
    </div>

    <button class="btn-start" onclick="init()" id="btn-init">
      <i class="bi bi-camera-fill"></i>
      Iniciar câmera
    </button>

    <div id="status-msg">Clique no botão para permitir o acesso à câmera</div>

    <div id="label-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/zmeHP47RtI/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const btn = document.getElementById("btn-init");
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Carregando...';
      btn.disabled = true;

      document.getElementById("status-msg").textContent = "Carregando modelo e acessando câmera...";

      try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(280, 280, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
          const card = document.createElement("div");
          card.className = "label-card";

          const nameRow = document.createElement("div");
          nameRow.className = "label-name";

          const nameSpan = document.createElement("span");
          nameSpan.id = "label-name-" + i;
          nameSpan.textContent = "Classe " + (i + 1);

          const percentSpan = document.createElement("span");
          percentSpan.id = "label-pct-" + i;
          percentSpan.style.color = "#e0d7ff";
          percentSpan.textContent = "0%";

          nameRow.appendChild(nameSpan);
          nameRow.appendChild(percentSpan);

          const progressWrap = document.createElement("div");
          progressWrap.className = "progress";

          const progressBar = document.createElement("div");
          progressBar.className = "progress-bar";
          progressBar.id = "bar-" + i;
          progressBar.style.width = "0%";
          progressBar.setAttribute("role", "progressbar");
          progressBar.setAttribute("aria-valuenow", "0");
          progressBar.setAttribute("aria-valuemin", "0");
          progressBar.setAttribute("aria-valuemax", "100");

          progressWrap.appendChild(progressBar);
          card.appendChild(nameRow);
          card.appendChild(progressWrap);
          labelContainer.appendChild(card);
        }

        btn.innerHTML = '<i class="bi bi-camera-video-fill"></i> Câmera ativa';
        btn.style.background = "linear-gradient(135deg, #059669, #0d9488)";
        btn.style.boxShadow = "0 4px 20px rgba(5,150,105,0.4)";
        document.getElementById("status-msg").textContent = "Analisando imagem em tempo real...";

      } catch (err) {
        btn.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Tentar novamente';
        btn.disabled = false;
        btn.style.background = "linear-gradient(135deg, #dc2626, #b91c1c)";
        document.getElementById("status-msg").textContent = "Erro: " + err.message;
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const pct = Math.round(prediction[i].probability * 100);
        document.getElementById("label-name-" + i).textContent = prediction[i].className;
        document.getElementById("label-pct-" + i).textContent = pct + "%";
        const bar = document.getElementById("bar-" + i);
        bar.style.width = pct + "%";
        bar.setAttribute("aria-valuenow", pct);
      }
    }
  </script>
</body>
</html>
